name: ML Pipeline

on:
  push:
    branches:
      - main

jobs:
  ml_pipeline:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

    steps:
      # ── 1. Code Checkout ───────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── 2. Dependency Installation ─────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 3. DVC Data Pull ───────────────────────────────────────────────
      - name: Configure DVC remote credentials
        run: |
          dvc remote modify bcs8_s3_remote access_key_id $AWS_ACCESS_KEY_ID
          dvc remote modify bcs8_s3_remote secret_access_key $AWS_SECRET_ACCESS_KEY

      - name: Pull data from DVC
        run: |
          aws sts get-caller-identity
          dvc pull

      # ── 4. Model Training + 5. MLflow Logging + 6. Metrics Generation ──
      - name: Train model and log to MLflow
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          python train.py

      # ── Upload metrics as GitHub artifact ──────────────────────────────
      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: output/metrics/metric.json

